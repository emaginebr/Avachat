services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avabot-api
    ports:
      - "${APP_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__AvaBotContext: ${CONNECTION_STRING}
      Elasticsearch__Url: ${ELASTICSEARCH_URL}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Auth__Username: ${AVABOT_USERNAME}
      Auth__Password: ${AVABOT_PASSWORD}
      Auth__JwtSecret: ${AVABOT_JWT_SECRET}
      WppConnect__SecretKey: ${WPP_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - emagine-network

  postgres:
    image: postgres:17-alpine
    container_name: avabot-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - emagine-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: avabot-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - emagine-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: avabot-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - emagine-network

  wppconnect:
    build:
      context: .
      dockerfile: wppconnect.Dockerfile
    image: avabot/wppconnect:latest
    container_name: avabot-wppconnect
    command: ["--secretKey", "${WPP_SECRET_KEY}", "--port", "21465"]
    ports:
      - "21465:21465"
    volumes:
      - wpp_tokens:/usr/src/wpp-server/tokens
    restart: unless-stopped
    networks:
      - emagine-network

volumes:
  postgres_data:
  es_data:
  wpp_tokens:

networks:
  emagine-network:
    driver: bridge
