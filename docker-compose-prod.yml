services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avabot-api
    restart: unless-stopped
    expose:
      - "80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__AvaBotContext: ${AVABOT_CONNECTION_STRING}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Auth__Username: ${AVABOT_USERNAME}
      Auth__Password: ${AVABOT_PASSWORD}
      Auth__JwtSecret: ${AVABOT_JWT_SECRET}
    networks:
      - emagine-network

networks:
  emagine-network:
    external: true
